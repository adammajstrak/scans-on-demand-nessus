<h1 id="tableLabel">Results</h1>

@if (!results.length) {
  <p><em>-</em></p>
}

<input type="text" class="form-control" (input)="filter()" (ngModel)="host" [(ngModel)]="host" placeholder="Search Host">

@if (results.length) {
  <table class='table table-striped' aria-labelledby="tableLabel">
    <thead>
      <tr>
        <th>Id</th>
        <th>Host</th>
        <th>Date</th>
        <th class="output-column">Output</th>
        <th>Severity</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (result of resultsFiltered; track result) {
        <tr>
          <td>{{ result.id }}</td>
          <td>{{ result.hostName }}</td>
          <td>{{ result.scanDate }}</td>
          <td class="output-column">{{ result.output }}</td>
          <td>{{ result.severity }}</td>
          <td><button class="btn" (click)="delete(result)"><i class="fa-solid fa-trash"></i></button></td>
        </tr>
      }
    </tbody>
  </table>
}

<div class="input-group mb-3">
  <button type="button" class="btn btn-primary" (click)="export()">Export</button>
</div>
